# The deployment deliverable (ADR 0005). Where and how this runs is an
# operational concern for whoever owns the box; the reverse proxy and TLS in
# front of `web` are not ours. We ship this file.
#
# First run, in this order (migrations never run on boot, ADR 0008):
#
#   cp secrets/postgres_password.example secrets/postgres_password
#   cp secrets/database_url.example      secrets/database_url   # and edit both
#   docker compose up -d postgres
#   docker compose --profile migrate run --rm migrate
#   docker compose up -d
#
# Deploys are the same three steps: pull, migrate, up.
name: rangers-platform

# Docker rotates no logs by default and a chatty container fills the disk, so
# every service opts in. There is no separate hardening phase to defer this to.
x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# The timings only. The `test:` command cannot be hoisted with them: each service
# probes its own port, and the port sits inside the command string, which a YAML
# anchor cannot parameterise.
x-healthcheck-timing: &healthcheck-timing
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 10s

# One image, used twice: by the worker, and by the one-shot migrator, which is
# that same image with the command overridden.
#
# Both defaults below are load-bearing, and both used to be wrong.
#
# GHCR_REPO must name the repository CI actually pushes to. The deploy always
# overrides it (cd.yaml derives it from GITHUB_REPOSITORY), so a wrong default is
# never exercised there and rots unnoticed: it only surfaces when a human types
# `docker compose up` on the box, at which point compose resolves a DIFFERENT
# image name, finds whatever ancient thing is cached under it, and runs that.
# That happened, and it silently started a months-old worker.
#
# RANGERS_BUILD_TAG is the short commit SHA. The deploy pins it, so `latest` is
# never pulled and the copy on the box is only as fresh as the last time somebody
# ran without a tag. The deploy therefore re-tags what it pulled as `latest`
# (cd.yaml), so a bare `docker compose up` on the box runs the code that is
# actually deployed rather than an artefact from another era.
x-worker-image: &worker-image
  image: ghcr.io/${GHCR_REPO:-ionaru/rangers-mono}/worker:${RANGERS_BUILD_TAG:-latest}
  build:
    context: .
    dockerfile: apps/worker/Dockerfile

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    logging: *logging
    environment:
      POSTGRES_USER: 7r
      POSTGRES_DB: 7r
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # ADR 0011's "a cheap thing worth doing anyway (not a backup)", which it
      # asked for and nobody built. The deploy dumps here before every migration
      # (ADR 0013). Same box on purpose: this protects against the likely
      # failure, a bad migration, not against losing the disk. The dumps are
      # member PII, which is exactly why ADR 0011 refused to put them in git.
      - ./backups:/backups
    # Loopback only. This exists so the local dev tasks (`deno task migrate`,
    # `deno task web:dev`) can reach the database from outside the network; it
    # is not an entry point for anything else.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 7r -d 7r"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    # Named so the same compose file builds locally and pulls on the server.
    # RANGERS_BUILD_TAG is the short commit SHA CI pushes; unset, you get the
    # local build. Deploys pin it, so `docker compose pull && up` is exact.
    image: ghcr.io/${GHCR_REPO:-ionaru/rangers-mono}/web:${RANGERS_BUILD_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    logging: *logging
    environment:
      # The DB password and URL stay file-based secrets; every other secret
      # comes from .env below (ADR 0014). The two meet here: this .env also
      # carries a localhost DATABASE_URL for the host-side `deno task` flows,
      # and DATABASE_URL_FILE deliberately beats it (packages/config/load.ts),
      # so the container cannot end up dialling localhost:5432 inside itself.
      DATABASE_URL_FILE: /run/secrets/database_url
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8085}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # On the server this file IS the secret store (ADR 0014), so its absence is
    # a fault worth failing on, not something to shrug off: without it the
    # service boots unconfigured. `environment:` above still wins key by key.
    env_file:
      - .env
    secrets:
      - database_url
    # 8085 is baked into the build by the Deno adapter, so it is a constant here,
    # not a knob. Bound to loopback: the host's existing nginx fronts it.
    ports:
      - "127.0.0.1:8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # `deno eval` runs with full permissions; passing --allow-net to it is an
      # error ("unexpected argument"), which fails the check while the app is fine.
      test:
        - CMD
        - deno
        - eval
        - "const r = await fetch('http://localhost:8085/healthz'); if (!r.ok) Deno.exit(1);"
      <<: *healthcheck-timing

  worker:
    <<: *worker-image
    restart: unless-stopped
    logging: *logging
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_INTERNAL_PORT: 8080
    # The TeamSpeak query credentials, the shared WORKER_INTERNAL_TOKEN and the
    # error-alert webhook all reach the worker through here (ADR 0014). From
    # Phase 2 the worker holds the ServerQuery connection, so a missing TS_* or a
    # missing WORKER_INTERNAL_TOKEN is a boot failure, by design: a worker that
    # is up but cannot reach TeamSpeak can serve neither of its two routes.
    env_file:
      - .env
    secrets:
      - database_url
    # No published port, ever. The internal API is reachable on the Compose
    # network only: never through the proxy, never public (ARCHITECTURE §2).
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - deno
        - eval
        - "const r = await fetch('http://localhost:8080/healthz'); if (!r.ok) Deno.exit(1);"
      <<: *healthcheck-timing

  # Migrations are a one-shot, never a boot step (ADR 0008: the legacy coupled
  # entity discovery to startup and paid for it). Behind a profile so a plain
  # `docker compose up` cannot run it by accident.
  #
  #   docker compose --profile migrate run --rm migrate
  migrate:
    profiles: ["migrate"]
    # The worker image, with the command overridden. It already carries
    # packages/db/drizzle/, which is what the runtime migrator reads.
    <<: *worker-image
    restart: "no"
    logging: *logging
    environment:
      # No env_file, unlike web and worker: the migrator reads DATABASE_URL and
      # nothing else, and that arrives from the mounted secret. Loading .env
      # here would add a way for this to fail and buy nothing.
      DATABASE_URL_FILE: /run/secrets/database_url
    secrets:
      - database_url
    command:
      - run
      - --cached-only
      - --allow-net
      - --allow-env
      - --allow-read
      - --allow-sys
      - packages/db/migrate.ts
    depends_on:
      postgres:
        condition: service_healthy

  # The legacy identity import (MIGRATION.md). A one-shot, run by hand, once,
  # after the migrations and before anyone logs in:
  #
  #   docker compose --profile import run --rm import --dry-run
  #   docker compose --profile import run --rm import
  #
  # Behind a profile for the same reason `migrate` is: a plain `docker compose
  # up` must not be able to run it by accident.
  #
  # The dump is BIND-MOUNTED rather than baked in, and that is not an
  # optimisation. It holds 150 members' Discord, TeamSpeak and Steam ids, so it
  # is in .gitignore and in .dockerignore, and it therefore cannot be in the
  # image at all (ARCHITECTURE §7, GDPR-lite). Copy it to ./data on the box, run
  # this, and it never touches a registry. Read-only: nothing here writes to it.
  import:
    profiles: ["import"]
    <<: *worker-image
    restart: "no"
    logging: *logging
    environment:
      # As `migrate`: DATABASE_URL from the mounted secret, and no env_file. The
      # importer reads the database and a file on disk, and nothing else.
      DATABASE_URL_FILE: /run/secrets/database_url
    secrets:
      - database_url
    volumes:
      - ./data:/app/data:ro
    # `entrypoint`, not `command`, and that is the difference between being able
    # to dry-run and not. `docker compose run <service> <args>` REPLACES the
    # service's `command`, so with the script in `command:` a trailing --dry-run
    # would blow the script away and run `deno --dry-run`. Arguments appended to
    # a `run` are handed to the entrypoint instead, so putting the whole
    # invocation here makes `... run --rm import --dry-run` mean what it says.
    #
    # The image's own entrypoint is repeated verbatim in front of it (/tini --
    # docker-entrypoint.sh), because overriding the entrypoint drops it: tini is
    # what reaps the process and forwards signals.
    entrypoint:
      - /tini
      - --
      - docker-entrypoint.sh
      - run
      - --cached-only
      - --allow-net
      - --allow-env
      - --allow-read
      - --allow-sys
      - packages/db/import-legacy.ts
    depends_on:
      postgres:
        condition: service_healthy

secrets:
  postgres_password:
    file: ./secrets/postgres_password
  database_url:
    file: ./secrets/database_url

volumes:
  postgres-data:
