name: Rangers Platform CD

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DENO_VERSION: 2.9.2

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      # The Deno version is pinned in three places: this workflow, .dvmrc, and
      # both Dockerfiles. One number, several homes, so it decays quietly unless
      # something checks. This is that something. The pin is load-bearing twice
      # over: ssh2 leans on node:crypto for a cipher Deno has broken before, and
      # the workspace symlinking this layout depends on only landed in Deno 2.9.
      - name: Deno version pin is consistent
        run: |
          set -euo pipefail
          fail=0
          check() {
            if ! grep -q "$2" "$1"; then
              echo "::error file=$1::expected Deno ${DENO_VERSION} (looked for '$2')"
              fail=1
            fi
          }
          check .dvmrc "^${DENO_VERSION}$"
          check apps/web/Dockerfile "denoland/deno:${DENO_VERSION}"
          check apps/worker/Dockerfile "denoland/deno:${DENO_VERSION}"
          exit $fail

      # apps/web/deno.prod.json is the web runtime image's manifest (it is copied
      # in as ./deno.json). It sits outside the Deno workspace and outside
      # deno.lock, so it hand-repeats the drizzle/postgres/zod pins and nothing
      # else can catch it drifting: `deno ci` never sees it, and `deno cache`
      # fails on a missing specifier, not a stale version. Bump drizzle in
      # packages/db and, without this, production silently keeps the old one.
      #
      # Compares version strings literally, so every manifest must pin exactly
      # ("0.45.2", never "^0.45.2"). That is already the house style, and a range
      # here would defeat the point: the runtime image resolves at build time.
      - name: Runtime dependency pins are consistent
        run: |
          set -euo pipefail
          fail=0
          check() {
            local name=$1 manifest=$2 want got
            want=$(jq -r --arg n "$name" '.dependencies[$n]' "$manifest")
            got=$(jq -r --arg n "$name" '
              .imports | to_entries[]
              | select(.key == $n or .key == ($n + "/"))
              | .value | capture("@(?<v>[0-9][^/]*)").v
            ' apps/web/deno.prod.json | sort -u)
            if [ "$got" != "$want" ]; then
              echo "::error file=apps/web/deno.prod.json::${name} resolves to '${got}' here but ${manifest} pins '${want}'"
              fail=1
            fi
          }
          check drizzle-orm packages/db/package.json
          check postgres    packages/db/package.json
          check zod         packages/config/package.json
          exit $fail

      # Installs strictly from deno.lock and fails if it is stale. Without this,
      # committing the lockfile is decoration.
      - name: Install (frozen lockfile)
        run: deno ci

      - name: Format
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Typecheck
        run: deno task check

      # The two pure functions this suite exists for (the TeamSpeak group
      # reconcile, the sample-to-session reconstruction) arrive in Phases 3 and
      # 5. For now: the config parser and the domain rules.
      - name: Test
        run: deno task test

      # The generated SQL is committed. If someone edits schema.ts and forgets to
      # regenerate, the schema and the migration drift apart silently, and the
      # first symptom is a production query failing on a column that never got
      # created.
      - name: Migrations match the schema
        run: |
          set -euo pipefail
          deno task db:generate
          if ! git diff --exit-code --quiet packages/db/drizzle; then
            echo "::error::schema.ts changed but packages/db/drizzle was not regenerated. Run: deno task db:generate"
            git diff --stat packages/db/drizzle
            exit 1
          fi

  meta:
    name: Image tag inputs
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.sha.outputs.sha_short }}
      repo: ${{ steps.repo.outputs.repo }}
    steps:
      - uses: actions/checkout@v4

      - id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # `github.repository` preserves the owner's canonical casing, and this
      # owner is `Ionaru`. OCI reference names must be lowercase, so using it
      # raw yields `ghcr.io/Ionaru/...`, which buildx and `docker compose pull`
      # both reject outright:
      #
      #   invalid reference format: repository name must be lowercase
      #
      # rangers-mono's workflow sidestepped this by hardcoding the owner. We
      # derive it, so we have to fold the case ourselves. `,,` is bash, which is
      # the default shell here.
      - id: repo
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

  images:
    name: Image (${{ matrix.service }})
    # Build on every PR, so a broken Dockerfile is caught in review. Push only
    # from the default branch.
    needs: [check, meta]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [web, worker]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          # ghcr.io/<owner>/<repo>/<service>, the same namespace shape
          # rangers-mono uses. Derived, so nothing here hardcodes an owner.
          tags: |
            ghcr.io/${{ needs.meta.outputs.repo }}/${{ matrix.service }}:${{ needs.meta.outputs.sha_short }}
            ghcr.io/${{ needs.meta.outputs.repo }}/${{ matrix.service }}:latest
          # Links the package to the repo, so it inherits the repo's visibility
          # rather than arriving orphaned.
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy
    needs: [meta, images]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: false
    steps:
      # The box is Windows with Docker Desktop, so the remote shell is
      # PowerShell (hence $env: rather than export). The known hazard, recorded
      # in ARCHITECTURE §6 and owned by the operator, not solved here: Docker
      # Desktop's engine only starts inside an interactive Windows login
      # session, so after an unattended reboot there is no daemon and the stack
      # stays down silently.
      #
      # Every deploy input is a secret, DEPLOY_PATH included: the directory
      # layout of the box is not something to publish in a workflow file. There
      # is deliberately no fallback value. An unset secret expands to an empty
      # string, so `cd` would land in the SSH user's home directory and the rest
      # of the script would run against whatever happened to be there. The guard
      # below turns that into a failure with a name on it.
      #
      # Deliberately no `docker system prune`. The box is not ours (ADR 0005):
      # it already runs the operator's nginx, the old bot and the old website. A
      # daemon-wide prune reaps every stopped container, every image not backing
      # a running one, and the shared build cache, so it breaks the next restart
      # of stacks this project does not own. Reclaiming disk on that box is the
      # operator's call, not the deploy's.
      #
      # Every step's exit code is checked explicitly, and that is not belt and
      # braces. PowerShell does not stop on a failing native command, and
      # `$ErrorActionPreference = 'Stop'` does NOT change that: it does not
      # govern native commands unless $PSNativeCommandUseErrorActionPreference
      # is on, which defaults to false in pwsh 7 and does not exist at all in
      # Windows PowerShell 5.1. A bare `$LASTEXITCODE` check is the only thing
      # that works on both. This used to be wrong here in the way that matters
      # most: a failed migration was swallowed, `up` ran anyway, and the deploy
      # went green with the new code live against the old schema.
      - uses: appleboy/ssh-action@v1.1.0
        with:
          command_timeout: 30m
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SECRET }}
          script: |
            # DEPLOY_PATH is a secret, so the box's directory layout is not
            # published in a workflow file, and it has deliberately no fallback:
            # an unset secret expands to an empty string, and `cd ''` would land
            # in the SSH user's home directory and run the rest against whatever
            # happened to be there.
            if (-not '${{ secrets.DEPLOY_PATH }}') { throw 'DEPLOY_PATH secret is not set' }
            cd '${{ secrets.DEPLOY_PATH }}'

            # The images are pinned to this SHA, so the compose.yaml must be too.
            # Unchecked, a failed switch deploys new images against an old file.
            git fetch -a
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            git switch -d ${{ needs.meta.outputs.sha_short }}
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            $env:GHCR_REPO = '${{ needs.meta.outputs.repo }}'
            $env:RANGERS_BUILD_TAG = '${{ needs.meta.outputs.sha_short }}'

            # Docker Desktop's credential helper reads the Windows Credential
            # Manager, and that only exists inside an interactive Windows logon
            # session. Over SSH there is none, so `docker-credential-desktop`
            # exits non-zero with "A specified logon session does not exist" and
            # takes `docker compose pull` down with it. This is the same root
            # cause as ADR 0005's recorded risk 1 (the engine needs an
            # interactive session); the credential helper needs one too.
            #
            # It had been failing on every deploy and nothing said so, because
            # the old script did not check the exit code: `up` then ran against
            # whatever images the box happened to already have.
            #
            # Nothing here needs credentials. The GHCR packages inherit the
            # repository's visibility and are public, and postgres comes from
            # Docker Hub. A DOCKER_CONFIG with no `credsStore` simply never
            # invokes the helper. Scoped to this session, so the operator's own
            # ~/.docker/config.json is left alone.
            #
            # The fruiz deploy solves this the same way but points at a
            # hand-made /docker-no-creds on the box. We write ours instead, so
            # the deploy carries no undocumented prerequisite and a fresh box
            # needs no preparation.
            $env:DOCKER_CONFIG = Join-Path (Get-Location) '.docker-ci'
            New-Item -ItemType Directory -Force -Path $env:DOCKER_CONFIG | Out-Null
            Set-Content -Path (Join-Path $env:DOCKER_CONFIG 'config.json') -Value '{}' -Encoding ascii

            # Checking this is what stops the migrator building its own image.
            # `docker compose run` has no --no-build (only --build; the negation
            # does not exist), and it will happily build from source when the
            # pinned tag is missing locally, then migrate from whatever it just
            # built. It only builds when the image is ABSENT, so a pull that is
            # verified to have succeeded is the guard. The migrate service shares
            # the worker's image via the x-worker-image anchor, so a plain `pull`
            # fetches it even though migrate sits behind a profile.
            docker compose pull
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            # Postgres must be up for both the dump and the migrator. After an
            # unattended reboot it may simply not be (ADR 0005, recorded risk 1).
            docker compose up -d --wait postgres
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            # ADR 0011: "the realistic disaster is not losing the disk, it is a
            # bad migration dropping a table." A migration that succeeds at doing
            # the wrong thing is otherwise unrecoverable: there are no down
            # migrations, and rolling the images back leaves the new schema in
            # place. Restore with:
            #   docker compose exec -T postgres pg_restore -U 7r -d 7r --clean --if-exists /backups/<file>
            #
            # Written inside the container, never piped through PowerShell: `>`
            # is text-mode and would corrupt a binary -Fc dump.
            $dump = 'pre-migrate-{0}-{1}.dump' -f (Get-Date -Format 'yyyyMMdd-HHmmss'), '${{ needs.meta.outputs.sha_short }}'
            docker compose exec -T postgres sh -c "pg_dump -U 7r -d 7r -Fc -f /backups/$dump"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            # Stop the app before migrating (ADR 0013). `docker compose run` does
            # not touch web and worker, so without this the previous release goes
            # on serving against a schema it was not written for, and DDL queues
            # behind its open transactions. A minute of downtime on a Saturday-
            # evening unit's site is cheaper than the expand/contract discipline
            # that would be needed to avoid it. Exits 0 when no container exists,
            # so a first deploy on a fresh box is fine.
            docker compose stop web worker
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            # The one-shot migrator (ADR 0008: never a boot step). Its exit code
            # is the whole point of this script: it used to be discarded, so a
            # failed migration still deployed, green, against the old schema.
            docker compose --profile migrate run --rm migrate
            if ($LASTEXITCODE -ne 0) { docker compose logs; exit $LASTEXITCODE }

            docker compose up --pull=never --no-build --wait --remove-orphans -d
            $deployExit = $LASTEXITCODE
            docker compose logs
            if ($deployExit -ne 0) { exit $deployExit }

            # Keep the last 10 dumps. Disk on the box is the operator's, but an
            # unbounded pile of PII is nobody's idea of a default. Errors are
            # swallowed on purpose: the deploy has already succeeded by here, and
            # failing it over housekeeping would be a lie about what happened.
            # One line on purpose: every other statement here is one, and a
            # trailing-pipe continuation is the one construct whose survival
            # through drone-ssh into PowerShell nobody has tested.
            Get-ChildItem './backups/*.dump' -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -Skip 10 | Remove-Item -Force -ErrorAction SilentlyContinue
